<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contáctanos - TrendyShop</title>


    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

    <header class="header-contacto">

        <img src="Logo 1 sin fondo.png" alt="Logo TrendyShop" class="hero-logo">

        <h1>Contáctanos</h1>

        <p>
            Nuestro equipo está listo para ayudarte.
            Responderemos tus consultas en el menor tiempo posible.
        </p>

    </header>

<main class="contact-container">

    <div class="info-contacto">

        <h2>Información de Contacto</h2>

        <p>Bogotá, Colombia</p>

        <p>+57 322 222 2222</p>

        <p>contacto@trendyshop.com</p>

    </div>

    <form id="contactForm" class="contact-form">

        <div class="fila">

            <div class="campo">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre">
            </div>

            <div class="campo">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo">
            </div>

        </div>

        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" rows="5"></textarea>

        <button type="submit">
            Enviar Mensaje
        </button>

    </form>

</main>

</body>
</html>
