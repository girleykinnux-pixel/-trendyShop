<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contáctanos - TrendyShop</title>

    <link 
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
      rel="stylesheet" 
      integrity="sha384-sRI14kxILfVy47J16cr9ZwB07vP4J8+LH7qK9nuquIAvNWLzeN8tE5YBUjZqJLB" 
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/style.css" />
</head>

<body>

    <header class="header-contacto">

        <img src="Logo 1 sin fondo.png" alt="Logo TrendyShop" class="hero-logo">

        <h1>Contáctanos</h1>

        <p>
            Nuestro equipo está listo para ayudarte.
            Responderemos tus consultas en el menor tiempo posible.
        </p>

    </header>

<main class="contact-container">

    <div class="info-contacto">

        <h2>Información de Contacto</h2>

        <p>Bogotá, Colombia</p>

        <p>+57 322 222 2222</p>

        <p>contacto@trendyshop.com</p>

    </div>

    <form id="contactForm" class="contact-form">

        <div class="fila">

            <div class="campo">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre">
            </div>

            <div class="campo">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo">
            </div>

        </div>

        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" rows="5"></textarea>

        <button type="submit">
            Enviar Mensaje
        </button>

    </form>

</main>

</body>
</html>
