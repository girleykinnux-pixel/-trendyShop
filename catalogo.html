<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Iconos de Bootstrap para el carrito y redes sociales -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>Productos</title>
  </head>
  <body>
    <header>
      <nav
        class="navbar navbar-expand-lg navbar-light bg-white fixed-top border-bottom"
      >
        <div class="container-fluid px-5">
          <a
            class="navbar-brand d-flex align-items-center gap-2"
            href="./index.html"
          >
            <img
              src="./assets/images/Logo.png"
              alt="Logo TrendyShop"
              height="35"
            />
            <span class="fw-bold">TrendyShop</span>
          </a>

          <div
            class="collapse navbar-collapse justify-content-center"
            id="navbarNav"
          >
            <ul class="navbar-nav gap-3">
              <li class="nav-item">
                <a class="nav-link" href="./index.html">Inicio</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="./catalogo.html">Catálogo</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./quienes-somos.html">Conócenos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./contactanos.html">Soporte</a>
              </li>
            </ul>
          </div>

          <div class="d-flex align-items-center gap-3">
            <form class="d-flex" role="search">
              <input
                class="form-control form-control-sm me-2"
                type="search"
                placeholder="Buscar productos..."
                aria-label="Search"
              />
              <button class="btn btn-outline-success btn-sm" type="submit">
                <i class="bi bi-search"></i>
              </button>
            </form>
          </div>
        </div>
      </nav>
    </header>

    <nav class="navbar bg-body-tertiary second-nav">
      <div class="container-fluid">
        <a class="navbar-brand" href="#"></a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="offcanvas"
          data-bs-target="#offcanvasNavbar"
          aria-controls="offcanvasNavbar"
          aria-label="Toggle navigation"
        >
          <a
            href="#"
            class="btn btn-outline-light position-relative p-1 text-dark"
          >
            <i class="bi bi-bag fs-5"></i>
            <span
              id="carrito-contador"
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success"
            >
              0
            </span>
          </a>
        </button>

        <div
          class="offcanvas offcanvas-end"
          tabindex="-1"
          id="offcanvasNavbar"
          aria-labelledby="carritoCompras"
        >
          <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="carritoCompras">Carrito</h5>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="offcanvas"
              aria-label="Close"
            ></button>
          </div>

          <div class="offcanvas-body">
            <div id="cartItems"></div>

            <hr />

            <div class="d-flex justify-content-between">
              <strong>Total:</strong>
              <strong id="sumaTotal">$0</strong>
            </div>

            <button
              id="checkoutBtn"
              type="button"
              class="btn btn-outline-success w-100 mt-3"
            >
              IR A PAGAR
            </button>
          </div>
        </div>
      </div>
    </nav>
    <main class="container my-5">
      <h1 class="h3 fw-normal mb-4">Tienda</h1>

      <!-- Aquí JS mete los productos -->
      <div class="row g-4" id="contenedor-productos"></div>

      <!-- Molde invisible -->
      <template id="molde-tarjeta">
        <div class="col-12 col-sm-6 col-md-4 col-lg-3">
          <div class="card h-100 border-0 position-relative tarjeta-producto">
            <span
              class="position-absolute top-0 start-0 bg-dark text-white px-2 py-1 m-2 fw-bold etiqueta-descuento"
              style="font-size: 0.75rem"
            ></span>

            <div
              class="bg-light d-flex align-items-center justify-content-center p-3"
              style="height: 250px"
            >
              <img
                src=""
                class="img-fluid object-fit-contain imagen-producto"
                alt=""
              />
            </div>

            <div class="card-body p-2 d-flex flex-column text-center">
              <h5
                class="card-title h6 fw-semibold mb-1 text-dark text-truncate titulo-producto"
              ></h5>

              <p
                class="card-text text-muted small mb-2 text-truncate descripcion-producto"
              ></p>

              <div class="mt-auto">
                <p class="mb-2">
                  <span class="fw-bold text-dark precio-producto"></span>
                </p>

                <button
                  class="btn btn-outline-success w-100 py-2 rounded-0 btnAgregarC btn-add-cart"
                >
                  Añadir Al Carrito
                </button>
              </div>
            </div>
          </div>
        </div>
      </template>
    </main>

    <script src="/js/productos.js"></script>
    <script src="js/carrito.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
